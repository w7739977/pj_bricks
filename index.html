<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>田园连连看</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="game-header">
    <div class="topbar">
      <h1 class="title">田园连连看</h1>
      <div class="meta" id="meta">第 <span id="round">1</span> 局</div>
    </div>
    <div class="farm-banner" aria-hidden="true">
      <svg viewBox="0 0 600 120" preserveAspectRatio="xMidYMid slice">
        <rect width="600" height="72" fill="#CDEFFC"/>
        <circle cx="72" cy="27" r="18" fill="#FFD34E" stroke="#3A3022" stroke-width="3"/>
        <path d="M118 29c16-13 30-6 34 3 15-8 32 0 34 11H110c0-6 3-11 8-14Z" fill="#FFFDF0" stroke="#3A3022" stroke-width="3" stroke-linejoin="round"/>
        <path d="M0 63Q92 35 184 63T368 63T600 58V92H0Z" fill="#8BCB67" stroke="#3A3022" stroke-width="3"/>
        <rect y="82" width="600" height="38" fill="#E6C45C"/>
        <path d="M0 94H600M0 106H600" stroke="#B08B35" stroke-width="3"/>
        <g transform="translate(430 22)" stroke="#3A3022" stroke-width="3" stroke-linejoin="round">
          <path d="M18 37 64 5l45 32v55H18Z" fill="#FFF7D6"/>
          <path d="m9 39 55-37 54 37-8 8-46-30-47 30Z" fill="#E95345"/>
          <rect x="31" y="52" width="22" height="20" rx="2" fill="#7AC7E8"/>
          <rect x="75" y="52" width="22" height="40" rx="2" fill="#5CA8D6"/>
          <path d="M31 62h22M42 52v20" fill="none"/>
        </g>
        <g fill="#FFFDF0" stroke="#3A3022" stroke-width="3" stroke-linecap="round">
          <path d="M218 67q18-18 36 0-18 8-36 0Z"/>
          <path d="M265 73q17-16 34 0-17 7-34 0Z"/>
        </g>
      </svg>
    </div>
  </header>

  <p id="tip" class="tip" aria-live="polite"></p>

  <main class="board-wrap">
    <div id="board" class="board" role="grid" aria-label="连连看棋盘"></div>
  </main>

  <nav class="controls" aria-label="工具">
    <button class="tool tool--hint" id="hintBtn" type="button" aria-label="提示">
      <svg viewBox="0 0 32 32" aria-hidden="true"><path d="M10 14a6 6 0 1 1 12 0c0 3-2 4-3 6h-6c-1-2-3-3-3-6Z"/><path d="M13 24h6M14 28h4"/></svg>
      <span>提示</span>
    </button>
    <button class="tool tool--shuffle" id="shuffleBtn" type="button" aria-label="手动重排">
      <svg viewBox="0 0 32 32" aria-hidden="true"><path d="M5 9h5c6 0 7 14 13 14h4"/><path d="m23 19 4 4-4 4M5 23h5c2 0 3-2 4-4M20 9h7M23 5l4 4-4 4"/></svg>
      <span>重排</span>
    </button>
    <button class="tool tool--restart" id="restartBtn" type="button" aria-label="重新开始">
      <svg viewBox="0 0 32 32" aria-hidden="true"><path d="M24 9a10 10 0 1 0 1 12"/><path d="M24 4v6h-6"/></svg>
      <span>重开</span>
    </button>
  </nav>

  <!-- 胜利弹框 -->
  <dialog id="winDialog" class="dialog dialog--win">
    <div class="dialog__card">
      <button class="dialog__close" data-close type="button" aria-label="关闭">✕</button>
      <h2 class="dialog__title">游戏胜利！</h2>
      <p class="dialog__desc">所有方块已消除完毕</p>
      <div class="dialog__actions">
        <button class="tool tool--primary" data-win-restart type="button">再来一局</button>
      </div>
    </div>
  </dialog>

  <!-- 死局弹框（首次） -->
  <dialog id="deadlockDialog" class="dialog dialog--deadlock">
    <div class="dialog__card">
      <h2 class="dialog__title">陷入死局</h2>
      <p class="dialog__desc">当前盘面已无可消除对，要怎么处理？</p>
      <div class="dialog__actions">
        <button class="tool tool--secondary" data-deadlock-giveup type="button">放弃本局</button>
        <button class="tool tool--primary" data-deadlock-reshuffle type="button">重排一次</button>
      </div>
    </div>
  </dialog>

  <!-- 游戏结束弹框（二次及以后死局） -->
  <dialog id="gameOverDialog" class="dialog dialog--gameover">
    <div class="dialog__card">
      <h2 class="dialog__title">游戏结束</h2>
      <p class="dialog__desc" id="gameOverDesc">本局共出现 2 次死局</p>
      <div class="dialog__actions">
        <button class="tool tool--primary" data-gameover-restart type="button">放弃本局并重开</button>
      </div>
    </div>
  </dialog>

  <script type="module" src="/game/main.js"></script>
</body>
</html>
